# NOTE: On first deploy, ACR must exist before images can be pushed, and images
# must exist before Container Apps can reference them. The infra step creates
# ACR; build step pushes images; deploy step updates Container Apps.

name: CI and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  APP_NAME: sampleapp
  WEB_IMAGE_NAME: sampleapp/web
  ORCH_IMAGE_NAME: sampleapp/orchestrator

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve environment-specific names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          ENV="${TARGET_ENV}"

          echo "resource_group=rg-${APP_NAME}-${ENV}" >> "$GITHUB_OUTPUT"
          echo "acr_name=${APP_NAME}acr${ENV}" >> "$GITHUB_OUTPUT"
          echo "web_app_name=${APP_NAME}-web-${ENV}" >> "$GITHUB_OUTPUT"
          echo "orchestrator_app_name=${APP_NAME}-orchestrator-${ENV}" >> "$GITHUB_OUTPUT"
          echo "param_file=infra/parameters/${ENV}.bicepparam" >> "$GITHUB_OUTPUT"

      - name: Deploy infrastructure with Bicep
        shell: bash
        run: |
          set -euo pipefail

          az group create \
            --name "${{ steps.names.outputs.resource_group }}" \
            --location "${{ vars.AZURE_LOCATION || 'eastus' }}"

          az deployment group create \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            --template-file "infra/main.bicep" \
            --parameters @"${{ steps.names.outputs.param_file }}" \
            --parameters \
              webImage="${{ steps.names.outputs.acr_name }}.azurecr.io/${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
              orchestratorImage="${{ steps.names.outputs.acr_name }}.azurecr.io/${{ env.ORCH_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

      - name: ACR login
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ steps.names.outputs.acr_name }}"

      - name: Build and push web image
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${{ steps.names.outputs.acr_name }}.azurecr.io"

          docker build \
            -t "${ACR_SERVER}/${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -t "${ACR_SERVER}/${{ env.WEB_IMAGE_NAME }}:latest" \
            ./apps/web

          docker push "${ACR_SERVER}/${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "${ACR_SERVER}/${{ env.WEB_IMAGE_NAME }}:latest"

      - name: Build and push orchestrator image
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${{ steps.names.outputs.acr_name }}.azurecr.io"

          docker build \
            -t "${ACR_SERVER}/${{ env.ORCH_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -t "${ACR_SERVER}/${{ env.ORCH_IMAGE_NAME }}:latest" \
            ./apps/orchestrator

          docker push "${ACR_SERVER}/${{ env.ORCH_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "${ACR_SERVER}/${{ env.ORCH_IMAGE_NAME }}:latest"

      - name: Run migrations
        shell: bash
        run: |
          set -euo pipefail

          # SAMPLE ONLY:
          # Replace this with your actual migration command.
          echo "::warning::Migration step is a placeholder. Replace with your actual migration process."

      - name: Deploy web Container App image
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${{ steps.names.outputs.acr_name }}.azurecr.io"

          az containerapp update \
            --name "${{ steps.names.outputs.web_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            --image "${ACR_SERVER}/${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Deploy orchestrator Container App image
        shell: bash
        run: |
          set -euo pipefail
          ACR_SERVER="${{ steps.names.outputs.acr_name }}.azurecr.io"

          az containerapp update \
            --name "${{ steps.names.outputs.orchestrator_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            --image "${ACR_SERVER}/${{ env.ORCH_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Resolve FQDNs
        id: fqdn
        shell: bash
        run: |
          set -euo pipefail

          WEB_FQDN=$(az containerapp show \
            --name "${{ steps.names.outputs.web_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)

          ORCH_FQDN=$(az containerapp show \
            --name "${{ steps.names.outputs.orchestrator_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)

          echo "web_fqdn=${WEB_FQDN}" >> "$GITHUB_OUTPUT"
          echo "orch_fqdn=${ORCH_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Verify health and readiness
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking web health..."
          curl --fail --show-error --silent "https://${{ steps.fqdn.outputs.web_fqdn }}/api/health"

          echo
          echo "Checking web readiness..."
          curl --fail --show-error --silent "https://${{ steps.fqdn.outputs.web_fqdn }}/api/ready"

          echo
          echo "Checking orchestrator health..."
          curl --fail --show-error --silent "https://${{ steps.fqdn.outputs.orch_fqdn }}/api/health"

          echo
          echo "Checking orchestrator readiness..."
          curl --fail --show-error --silent "https://${{ steps.fqdn.outputs.orch_fqdn }}/api/ready"

      - name: Show deployed revisions
        shell: bash
        run: |
          set -euo pipefail

          echo "Web revisions:"
          az containerapp revision list \
            --name "${{ steps.names.outputs.web_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            -o table

          echo
          echo "Orchestrator revisions:"
          az containerapp revision list \
            --name "${{ steps.names.outputs.orchestrator_app_name }}" \
            --resource-group "${{ steps.names.outputs.resource_group }}" \
            -o table